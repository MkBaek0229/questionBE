name: Test SERVER_HOST

on: workflow_dispatch # 수동 실행 가능하도록 설정

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Debug Secrets - Check SERVER_HOST in GitHub Actions
        run: echo "GitHub Actions에서 확인한 SERVER_HOST=${{ secrets.SERVER_HOST }}"

      - name: Check SERVER_HOST on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "🔍 서버에서 확인된 SERVER_HOST 값: ${{ secrets.SERVER_HOST }}"
